# Tmux configuration
# Change prefix key to Ctrl+a (common setup)

# Unbind default prefix (C-b)
unbind C-b

# Set new prefix to C-a
set -g prefix C-a

# Bind C-a to send C-a to inner programs (e.g., nested tmux/screen)
bind C-a send-prefix

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf!"

# Enable mouse (optional, modern default)
set -g mouse on

# More scrollback
set -g history-limit 10000

# Pi Recommendations
set -g extended-keys on
set -g extended-keys-format csi-u

# Grok
set -g allow-passthrough on

# New windows and panes inherit the current working directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Create new session with prompt (very handy)
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Custom clock
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %a %b %d %I:%M%p"

# Theme (managed by bin/theme - defaults to dark; switcher will rewrite this line)
source-file ~/.config/tmux/one_dark.conf

