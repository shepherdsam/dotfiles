# =====================================================
# One Dark + Blue Accent tmux theme
# =====================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- Status bar ---
set -g status-style bg=default,fg='#abb2bf'
set -g status-left-style fg='#61afef'
set -g status-right-style fg='#61afef'

# --- Pane borders ---
set -g pane-border-style fg='#abb2bf',bg=default
set -g pane-active-border-style fg='#61afef',bg=default

# --- Messages ---
set -g message-style bg='#61afef',fg='#282c34'
set -g message-command-style bg='#61afef',fg='#282c34'

# --- Window tabs ---
set -g window-status-current-style bg=default,fg='#61afef',bold
set -g window-status-style bg=default,fg='#abb2bf'
set -g window-status-separator "  "

