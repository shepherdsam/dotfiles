# =====================================================
# One Light + Green Accent tmux theme
# =====================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- Status bar ---
set -g status-style bg=default,fg='#2a2b33'
set -g status-left-style fg='#3e953a'
set -g status-right-style fg='#3e953a'

# --- Pane borders ---
set -g pane-border-style fg='#cccccc',bg=default
set -g pane-active-border-style fg='#3e953a',bg=default

# --- Messages ---
set -g message-style bg='#3e953a',fg='#ffffff'
set -g message-command-style bg='#3e953a',fg='#ffffff'

# --- Window tabs ---
set -g window-status-current-style bg=default,fg='#3e953a',bold
set -g window-status-style bg=default,fg='#2a2b33'
set -g window-status-separator "  "

