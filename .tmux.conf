# Tmux configuration
# Change prefix key to Ctrl+a (common setup)

# Unbind default prefix (C-b)
unbind C-b

# Set new prefix to C-a
set -g prefix C-a

# Bind C-a to send C-a to inner programs (e.g., nested tmux/screen)
bind C-a send-prefix

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded tmux.conf!"

# Enable mouse (optional, modern default)
set -g mouse on

# Pi Recommendations
set -g extended-keys on
set -g extended-keys-format csi-u

# New windows and panes inherit the current working directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Create new session with prompt (very handy)
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# A bit of theming 
set -g status-style bg=default,fg=colour12
set -g pane-border-style fg=colour238,bg=default
set -g pane-active-border-style fg=colour12,bg=default
set -g message-command-style bg=black,fg=colour12
set -g message-style bg=colour12,fg=black

# Custom clock
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %a %b %d %I:%M%p"
